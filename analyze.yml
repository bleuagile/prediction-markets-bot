name: Prediction Markets AI Autopilot

on:
  schedule:
    - cron: '*/5 * * * *'   # Cada 5 minutos, 24/7 gratis
  workflow_dispatch:          # También permite correrlo manualmente

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Necesario para hacer commit del resultado

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node analyze.js

      - name: Commit & push results
        run: |
          git config user.name "AI Autopilot Bot"
          git config user.email "bot@prediction-markets.app"
          git add public/latest-analysis.json
          git diff --staged --quiet || git commit -m "📊 Auto-análisis $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
